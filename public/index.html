<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux Scheduler V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ TaskFlow V2</h1>
            <p>Estado del Latido: <span id="status">Desconectado</span></p>
        </header>

        <section class="actions">
            <button onclick="testNotification()" class="btn-test">🔔 Probar Notificación</button>
        </section>

        <section class="log-container">
            <h3>Terminal de Eventos</h3>
            <div id="log-window" class="log-window"></div>
        </section>

        <section class="new-task">
            <h3>Programar Tarea Rápida</h3>
            <div class="form">
                <input type="text" id="task-name" placeholder="Nombre (Ej: Beber agua)">
                <input type="time" id="task-time" value="08:00">
                <button onclick="addTask()" class="btn-add">+ Programar</button>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
