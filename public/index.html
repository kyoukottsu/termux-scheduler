<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux Scheduler V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ TaskFlow V2</h1>
            <p>Estado del Latido: <span id="status">Desconectado</span></p>
        </header>

        <section class="clock-card">
            <div id="clock-time" class="clock-time">00:00:00</div>
            <div id="clock-date" class="clock-date">Cargando fecha...</div>
        </section>

        <section class="config-section">
            <div class="section-header">
                <h3>⚙️ Configuración Global</h3>
            </div>
            <div class="form-row">
                <input type="text" id="config-badge-id" placeholder="ID de Gafete (Ej: 5057358)">
                <button onclick="saveGlobalConfig()" class="btn-save">Guardar</button>
            </div>
        </section>

        <section class="actions">
            <button onclick="testNotification()" class="btn-test">🔔 Probar Notificación</button>
        </section>

        <section class="log-container">
            <h3>Terminal de Eventos</h3>
            <div id="log-window" class="log-window"></div>
        </section>

        <section class="tasks-section">
            <div class="section-header">
                <h3>Tareas Programadas</h3>
                <button onclick="loadTasks()" class="btn-refresh">🔄</button>
            </div>
            <div id="task-list" class="task-list">
                <p class="empty-msg">No hay tareas programadas.</p>
            </div>
        </section>

        <section class="new-task">
            <h3>Programar Tarea Rápida</h3>
            <div class="form">
                <div class="input-group">
                    <input type="text" id="task-name" placeholder="Nombre (Ej: Entrada OXXO)">
                    <select id="task-type" class="task-select" title="Seleccionar tipo de tarea automatizada">
                        <option value="NOTIFICATION">🔔 Solo Recordatorio</option>
                        <option value="PUNCH_IN">📥 Marcaje Entrada</option>
                        <option value="PUNCH_OUT">📤 Marcaje Salida</option>
                    </select>
                </div>
                <input type="time" id="task-time" value="08:00">
                
                <div class="days-selector">
                    <p>Repetir los días:</p>
                    <div class="days-grid">
                        <label class="day-btn"><input type="checkbox" value="1" checked><span>L</span></label>
                        <label class="day-btn"><input type="checkbox" value="2" checked><span>M</span></label>
                        <label class="day-btn"><input type="checkbox" value="3" checked><span>X</span></label>
                        <label class="day-btn"><input type="checkbox" value="4" checked><span>J</span></label>
                        <label class="day-btn"><input type="checkbox" value="5" checked><span>V</span></label>
                        <label class="day-btn"><input type="checkbox" value="6" checked><span>S</span></label>
                        <label class="day-btn"><input type="checkbox" value="0" checked><span>D</span></label>
                    </div>
                </div>

                <button onclick="addTask()" class="btn-add">🚀 Programar Tarea</button>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
